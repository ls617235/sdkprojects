version: '3.8'

services:
  # 前端
  frontend:
    image: sdk-share-frontend:1.0.0
    container_name: sdk-share-frontend
    expose:
      - "5000"
    restart: unless-stopped

  # 后端
  backend:
    image: sdk-share-backend:1.0.0
    container_name: sdk-share-backend
    expose:
      - "8000"
    restart: unless-stopped

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: sdk-share-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

networks:
  default:
    name: sdk-network
